name: Build Android APK

# Builds an installable APK in the cloud (no local Android toolchain needed).
# Trigger it manually from the GitHub "Actions" tab, or on every push to main.
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write # needed to publish the APK to a GitHub Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform folder
        # The repo only ships lib/ + pubspec; this regenerates android/ etc.
        # It will NOT overwrite existing lib/ source.
        run: flutter create . --org com.nandhakumar --project-name family_finance

      - name: Configure Android native bits (biometric + Firebase minSdk)
        # `flutter create` regenerates a default MainActivity that extends
        # FlutterActivity. The local_auth plugin's authenticate() REQUIRES a
        # FlutterFragmentActivity host — otherwise enabling fingerprint/face
        # unlock crashes the app (a common "installed but not accessible /
        # keeps stopping" symptom). We also declare the biometric permission,
        # and bump minSdk to 23 (Firebase Auth's minimum).
        run: |
          MA=$(find android/app/src/main -name 'MainActivity.kt' | head -n1)
          if [ -n "$MA" ]; then
            sed -i 's/io\.flutter\.embedding\.android\.FlutterActivity/io.flutter.embedding.android.FlutterFragmentActivity/' "$MA"
            sed -i 's/: *FlutterActivity()/: FlutterFragmentActivity()/' "$MA"
            echo "Patched $MA to FlutterFragmentActivity:"; cat "$MA"
          else
            echo "::warning::MainActivity.kt not found - biometric host not patched."
          fi
          MAN=android/app/src/main/AndroidManifest.xml
          if [ -f "$MAN" ] && ! grep -q "USE_BIOMETRIC" "$MAN"; then
            sed -i 's#\(<manifest[^>]*>\)#\1\n    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>#' "$MAN"
            echo "Declared USE_BIOMETRIC permission."
          fi
          if [ -f "$MAN" ] && ! grep -q "POST_NOTIFICATIONS" "$MAN"; then
            sed -i 's#\(<manifest[^>]*>\)#\1\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>#' "$MAN"
            echo "Declared POST_NOTIFICATIONS permission."
          fi
          # Pin minSdk to 26 (Firebase Auth needs >=23; 26 also gives native
          # java.time) AND enable core library desugaring. As of v17,
          # flutter_local_notifications REQUIRES desugaring via its AAR metadata
          # regardless of minSdk — without it the build dies at
          # :app:checkDebugAarMetadata. We append a second android{}/dependencies{}
          # block (Gradle merges them), which is far more robust than editing the
          # template's existing blocks in place. Handles Groovy + Kotlin DSL.
          for GF in android/app/build.gradle android/app/build.gradle.kts; do
            [ -f "$GF" ] || continue
            sed -i -E 's/minSdk(Version)?[ =]+flutter\.minSdkVersion/minSdk = 26/' "$GF"
            # App package id. flutter create derives it from --org + project name
            # (…family_finance, with an underscore); pin it to the exact id we
            # registered in Firebase. Only the applicationId line is touched, so
            # the namespace/Kotlin package stay consistent and compile.
            sed -i -E 's/applicationId([ =]*)"[^"]*"/applicationId\1"com.nandhakumar.familyfinance"/' "$GF"
            case "$GF" in
              *.kts)
                printf '\nandroid {\n    compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n    }\n}\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")\n}\n' >> "$GF"
                ;;
              *)
                printf '\nandroid {\n    compileOptions {\n        coreLibraryDesugaringEnabled true\n    }\n}\ndependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"\n}\n' >> "$GF"
                ;;
            esac
            echo "Set minSdk=26 + enabled core library desugaring in $GF"
          done

      - name: Restore fixed debug keystore
        # A fixed keystore => fixed SHA-1 => Google Sign-In works. Flutter signs
        # both debug AND release APKs with this debug keystore by default, so
        # restoring it here makes both builds match the SHA-1 you registered in
        # Google Cloud. If the secret isn't set yet, fall back to an ephemeral
        # key (the app builds, but Google Sign-In will fail until configured).
        env:
          KS: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then
            mkdir -p "$HOME/.android"
            echo "$KS" | base64 -d > "$HOME/.android/debug.keystore"
            echo "Restored fixed debug keystore."
          else
            echo "::warning::ANDROID_DEBUG_KEYSTORE_BASE64 not set - Google Sign-In will fail. Run the 'Generate Signing Keystore' workflow first."
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK (always installable)
        # GOOGLE_SERVER_CLIENT_ID is your OAuth *Web* client ID (not a secret).
        # GOOGLE_BACKEND_URL points at the optional daily-report backend.
        env:
          SCID: ${{ vars.GOOGLE_SERVER_CLIENT_ID }}
          BURL: ${{ vars.GOOGLE_BACKEND_URL }}
        run: |
          flutter build apk --debug \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=$SCID \
            --dart-define=GOOGLE_BACKEND_URL=$BURL

      - name: Build release APK (debug-signed by default)
        env:
          SCID: ${{ vars.GOOGLE_SERVER_CLIENT_ID }}
          BURL: ${{ vars.GOOGLE_BACKEND_URL }}
        run: |
          flutter build apk --release \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=$SCID \
            --dart-define=GOOGLE_BACKEND_URL=$BURL

      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: family-finance-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v5
        with:
          name: family-finance-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish APK to the 'latest' release
        # Publishes the RELEASE apk (optimized + non-debuggable) so Android /
        # Play Protect doesn't block it as an "unsafe" debug build — the usual
        # cause of "app not installed / not accessible" on a sideloaded build.
        # It's debug-keystore-signed (see above) so the registered SHA-1 still
        # matches and Google Sign-In keeps working. Stable one-tap URLs:
        #   .../releases/latest/download/app-release.apk   (recommended)
        #   .../releases/latest/download/app-debug.apk     (fallback)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/app-debug.apk \
            --title "Latest Android build" \
            --notes "Auto-built from ${{ github.sha }}"
