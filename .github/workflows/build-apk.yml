name: Build Android APK

# Builds an installable APK in the cloud (no local Android toolchain needed).
# Trigger it manually from the GitHub "Actions" tab, or on every push to main.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform folder
        # The repo only ships lib/ + pubspec; this regenerates android/ etc.
        # It will NOT overwrite existing lib/ source.
        run: flutter create . --org net.ramrajcotton --project-name family_finance

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK (always installable)
        run: flutter build apk --debug

      - name: Build release APK (debug-signed by default)
        run: flutter build apk --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: family-finance-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: family-finance-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
