name: Print signing SHA-1

# One-off helper: decodes the ANDROID_DEBUG_KEYSTORE_BASE64 secret (the exact
# keystore that signs the APKs) and prints its SHA-1 / SHA-256 fingerprint, so
# we register the RIGHT one in Firebase. The fingerprint is public info (safe to
# print); the keystore file itself is never echoed.
on:
  workflow_dispatch:

jobs:
  sha:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode the signing keystore and print its fingerprint
        env:
          KS: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS" ]; then echo "::error::ANDROID_DEBUG_KEYSTORE_BASE64 is not set"; exit 1; fi
          echo "$KS" | base64 -d > debug.keystore
          echo "=================== REGISTER THIS SHA-1 IN FIREBASE ==================="
          keytool -list -v -keystore debug.keystore -storepass android -alias androiddebugkey \
            | grep -E "SHA1:|SHA256:"
          echo "======================================================================"
