name: Deploy Web to GitHub Pages

# Builds the Flutter web app and publishes it to GitHub Pages.
# The live site replaces the README page at:
#   https://nandhakumarmnk.github.io/family-finance/
#
# One-time setup required in the repo:
#   Settings > Pages > Build and deployment > Source = "GitHub Actions"
on:
  workflow_dispatch:
  push:
    branches: [main]

# Permissions needed for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform folders (web)
        # The repo only ships lib/ + pubspec; this regenerates web/ etc.
        # It will NOT overwrite existing lib/ source.
        run: flutter create . --org net.ramrajcotton --project-name family_finance --platforms web

      - name: Inject Google Sign-In web client ID
        # web/index.html is regenerated by `flutter create`, so inject the
        # OAuth Web client ID meta tag here. Google Sign-In on the web reads
        # this tag. The matching site origin must be an authorized JavaScript
        # origin on that Web client in Google Cloud Console.
        env:
          SCID: ${{ vars.GOOGLE_SERVER_CLIENT_ID }}
        run: |
          if [ -n "$SCID" ]; then
            sed -i "s#</head>#  <meta name=\"google-signin-client_id\" content=\"$SCID\">\n</head>#" web/index.html
            echo "Injected google-signin-client_id meta tag."
          else
            echo "::warning::GOOGLE_SERVER_CLIENT_ID variable not set - web sign-in will not work."
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        # base-href MUST match the repo subpath so assets resolve correctly.
        # GOOGLE_SERVER_CLIENT_ID lets web sign-in mint an offline serverAuthCode;
        # GOOGLE_BACKEND_URL points at the optional daily-report backend.
        env:
          SCID: ${{ vars.GOOGLE_SERVER_CLIENT_ID }}
          BURL: ${{ vars.GOOGLE_BACKEND_URL }}
        run: |
          flutter build web --release --base-href /family-finance/ \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=$SCID \
            --dart-define=GOOGLE_BACKEND_URL=$BURL

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
