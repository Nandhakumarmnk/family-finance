name: Generate Signing Keystore (run once)

# ONE-TIME helper. Run this manually from the Actions tab to create a STABLE
# Android debug keystore. A fixed keystore gives a fixed SHA-1 fingerprint,
# which is what Google Sign-In requires you to register in Google Cloud.
#
# After it runs, open the run and:
#   1. Copy the SHA1 line from the "Show fingerprints" step  -> register in Google Cloud.
#   2. Download the "android-debug-keystore" artifact (contains the .jks and a
#      base64 .txt). Put the base64 string into the repo secret
#      ANDROID_DEBUG_KEYSTORE_BASE64 (Settings > Secrets and variables > Actions).
#
# Note: a *debug* keystore uses well-known passwords (android / androiddebugkey),
# so it is not a real secret. This is fine for a personal/family app distributed
# as a debug-signed APK. For a public Play Store release you'd use a private
# release keystore instead.
on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate fixed debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Show fingerprints (copy the SHA1)
        run: |
          echo "=================== REGISTER THIS SHA-1 ==================="
          keytool -list -v -keystore debug.keystore -storepass android -alias androiddebugkey \
            | grep -E "SHA1:|SHA256:"
          echo "=========================================================="

      - name: Base64-encode for the repo secret
        run: |
          base64 -w0 debug.keystore > debug.keystore.base64.txt
          echo "Wrote base64 (this whole string goes into ANDROID_DEBUG_KEYSTORE_BASE64):"
          cat debug.keystore.base64.txt
          echo ""

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-keystore
          path: |
            debug.keystore
            debug.keystore.base64.txt
