name: family_finance
description: Family Finance Manager — salary, expenses, EMIs, targets and a shared family wallet, stored as Excel files on Google Drive.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Auth + Google Drive (legacy storage path; kept as a fallback)
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  http: ^1.2.2

  # Cloud backend (free Firestore) — makes the app global for all users and
  # families with no Google OAuth verification and no server to run. Activated
  # automatically once lib/firebase_options.dart holds real values.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Excel storage (dynamic-value API; stable and simple)
  excel: ^2.1.0

  # Local cache / preferences
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Biometric (fingerprint / face) app unlock
  local_auth: ^2.3.0

  # Device notifications for payment reminders — they appear in the phone's
  # notification tray (like WhatsApp/email) even when the app is closed.
  # On-device only: no server, no cloud messaging, no cost.
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # UI / charts / formatting
  fl_chart: ^0.69.0
  intl: ^0.19.0

  # PDF statements, sharing/printing, and opening external links
  pdf: ^3.11.1
  printing: ^5.13.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
